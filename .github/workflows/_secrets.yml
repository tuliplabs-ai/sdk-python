name: secrets

on:
  workflow_call:
    secrets:
      GITGUARDIAN_API_KEY:
        required: false

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0 # scan the full history, not just the tip
      - name: Scan history with gitleaks
        run: |
          set -euo pipefail
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner

  gitguardian:
    name: gitguardian
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      # actions/setup-python@v6.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
      - name: Scan with ggshield
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          set -eu
          if [ -z "${GITGUARDIAN_API_KEY:-}" ]; then
            echo "::notice::GITGUARDIAN_API_KEY not set — add the org/repo secret to enable GitGuardian. Skipping."
            exit 0
          fi
          pip install --quiet ggshield
          ggshield secret scan ci
