services:
  mysql:
    image: mysql:8.4
    container_name: tulip-integration-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DB:-tulip_test}
      MYSQL_USER: ${MYSQL_USER:-tulip}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tulip}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-tulip-root}
    ports:
    - 127.0.0.1:${MYSQL_PORT:-3306}:3306
    healthcheck:
      test: [CMD-SHELL, 'mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent']
      interval: 5s
      timeout: 3s
      retries: 20
    tmpfs:
    - /var/lib/mysql
