<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380"
     font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
     shape-rendering="geometricPrecision">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="a" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0,0 L 12,6 L 0,12 z" fill="#2A2F2F"/>
    </marker>
    <marker id="am" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0,0 L 12,6 L 0,12 z" fill="#6C3F49"/>
    </marker>
  </defs>

  <!-- User prompt -->
  <g filter="url(#sh)">
    <rect x="280" y="20" width="160" height="40" rx="10" fill="#FBF9F8" stroke="#2A2F2F" stroke-width="1.2"/>
    <text x="360" y="45" text-anchor="middle" font-size="12" font-weight="600" fill="#2A2F2F">user prompt</text>
  </g>
  <line x1="360" y1="60" x2="360" y2="90" stroke="#2A2F2F" stroke-width="2" marker-end="url(#a)"/>

  <!-- Coordinator -->
  <g filter="url(#sh)">
    <rect x="240" y="95" width="240" height="60" rx="12" fill="#C74634"/>
    <text x="360" y="125" text-anchor="middle" font-size="16" font-weight="800" fill="#FFFFFF">Coordinator</text>
    <text x="360" y="143" text-anchor="middle" font-size="11" font-weight="500" fill="#FFFFFF" opacity="0.85">decides who handles each sub-task</text>
  </g>

  <!-- Specialists row (3) -->
  <g filter="url(#sh)">
    <rect x="40"  y="200" width="180" height="70" rx="10" fill="#04536F"/>
    <text x="130" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Procurement</text>
    <text x="130" y="247" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.85">vendor catalogue</text>
    <text x="130" y="261" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.85">price quoting</text>

    <rect x="270" y="200" width="180" height="70" rx="10" fill="#04536F"/>
    <text x="360" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Compliance</text>
    <text x="360" y="247" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.85">SOC2 / ISO posture</text>
    <text x="360" y="261" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.85">contract review</text>

    <rect x="500" y="200" width="180" height="70" rx="10" fill="#04536F"/>
    <text x="590" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Approval Officer</text>
    <text x="590" y="247" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.85">submit_po</text>
    <text x="590" y="261" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.85">email_cfo</text>
  </g>

  <!-- Dispatch arrows -->
  <line x1="300" y1="155" x2="160" y2="195" stroke="#2A2F2F" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="360" y1="155" x2="360" y2="195" stroke="#2A2F2F" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="420" y1="155" x2="560" y2="195" stroke="#2A2F2F" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Result arrows back (dashed mauve) -->
  <line x1="160" y1="275" x2="300" y2="295" stroke="#6C3F49" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#am)"/>
  <line x1="360" y1="275" x2="360" y2="295" stroke="#6C3F49" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#am)"/>
  <line x1="560" y1="275" x2="420" y2="295" stroke="#6C3F49" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#am)"/>

  <!-- Final answer -->
  <g filter="url(#sh)">
    <rect x="240" y="300" width="240" height="50" rx="10" fill="#F0CC71"/>
    <text x="360" y="330" text-anchor="middle" font-size="13" font-weight="700" fill="#3A2A0F">merged final answer</text>
  </g>

  <text x="20" y="365" font-size="11" font-style="italic" fill="#2A2F2F">specialists run in parallel · coordinator merges + decides next step · model picks the right tool, tulip picks the right expert</text>
</svg>
