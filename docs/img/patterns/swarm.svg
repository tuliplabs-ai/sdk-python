<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380"
     font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
     shape-rendering="geometricPrecision">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="a" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0,0 L 12,6 L 0,12 z" fill="#2A2F2F"/>
    </marker>
  </defs>

  <!-- Shared context (top) -->
  <g filter="url(#sh)">
    <rect x="60" y="30" width="600" height="80" rx="14" fill="#F0CC71"/>
    <text x="360" y="58" text-anchor="middle" font-size="14" font-weight="800" fill="#3A2A0F" letter-spacing="0.04em">SHARED CONTEXT · TASK QUEUE</text>
    <rect x="100" y="68" width="100" height="28" rx="6" fill="#FFFFFF" stroke="#3A2A0F" stroke-width="1"/>
    <text x="150" y="86" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3A2A0F">read corpus</text>
    <rect x="220" y="68" width="100" height="28" rx="6" fill="#FFFFFF" stroke="#3A2A0F" stroke-width="1"/>
    <text x="270" y="86" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3A2A0F">summarise</text>
    <rect x="340" y="68" width="100" height="28" rx="6" fill="#FFFFFF" stroke="#3A2A0F" stroke-width="1"/>
    <text x="390" y="86" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3A2A0F">cite</text>
    <rect x="460" y="68" width="100" height="28" rx="6" fill="#FFFFFF" stroke="#3A2A0F" stroke-width="1"/>
    <text x="510" y="86" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3A2A0F">fact-check</text>
    <rect x="580" y="68" width="60" height="28" rx="6" fill="#FFFFFF" stroke="#3A2A0F" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="610" y="86" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6C3F49">…</text>
  </g>

  <!-- Agents row -->
  <g filter="url(#sh)">
    <rect x="60"  y="180" width="140" height="80" rx="12" fill="#89B2B0"/>
    <text x="130" y="205" text-anchor="middle" font-size="14" font-weight="700" fill="#1F2828">Researcher</text>
    <text x="130" y="226" text-anchor="middle" font-size="10" fill="#1F2828" opacity="0.85">RAG · summarise</text>
    <text x="130" y="242" text-anchor="middle" font-size="10" fill="#1F2828" opacity="0.85">cite</text>

    <rect x="230" y="180" width="140" height="80" rx="12" fill="#89B2B0"/>
    <text x="300" y="205" text-anchor="middle" font-size="14" font-weight="700" fill="#1F2828">Fact-checker</text>
    <text x="300" y="226" text-anchor="middle" font-size="10" fill="#1F2828" opacity="0.85">verify claims</text>
    <text x="300" y="242" text-anchor="middle" font-size="10" fill="#1F2828" opacity="0.85">flag conflicts</text>

    <rect x="400" y="180" width="140" height="80" rx="12" fill="#89B2B0"/>
    <text x="470" y="205" text-anchor="middle" font-size="14" font-weight="700" fill="#1F2828">Writer</text>
    <text x="470" y="226" text-anchor="middle" font-size="10" fill="#1F2828" opacity="0.85">draft</text>
    <text x="470" y="242" text-anchor="middle" font-size="10" fill="#1F2828" opacity="0.85">revise</text>

    <rect x="570" y="180" width="100" height="80" rx="12" fill="#89B2B0" stroke="#3A2A0F" stroke-width="1.4" stroke-dasharray="4,3"/>
    <text x="620" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#1F2828">…peer N</text>
    <text x="620" y="226" text-anchor="middle" font-size="10" fill="#1F2828" opacity="0.85">add when</text>
    <text x="620" y="242" text-anchor="middle" font-size="10" fill="#1F2828" opacity="0.85">capacity</text>
  </g>

  <!-- Pull arrows (agents pull tasks from shared queue) -->
  <line x1="130" y1="175" x2="155" y2="115" stroke="#2A2F2F" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <line x1="300" y1="175" x2="280" y2="115" stroke="#2A2F2F" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <line x1="470" y1="175" x2="395" y2="115" stroke="#2A2F2F" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <line x1="620" y1="175" x2="520" y2="115" stroke="#2A2F2F" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#a)"/>

  <!-- Push arrows (agents post follow-up tasks back) -->
  <path d="M 130 265 Q 100 320, 360 320 Q 620 320, 620 265"
        stroke="#C74634" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="320" y="345" text-anchor="middle" font-size="11" font-weight="600" fill="#C74634" font-style="italic">agents post follow-up tasks · any peer can pick them up</text>

  <text x="20" y="375" font-size="11" font-style="italic" fill="#2A2F2F">no central router · peer-to-peer · `max_iterations` ceiling guarantees termination</text>
</svg>
