<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1080"
     font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
     shape-rendering="geometricPrecision">

  <!-- tuliplabs palette
       accent1 #04536F  deep teal     accent3 #C74634  tulip pink
       accent5 #89B2B0  sage teal     accent4 #F0CC71  sand
       accent2 #6C3F49  mauve         dk1     #2A2F2F  text -->

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" viewBox="0 0 12 12" refX="11" refY="6"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0,0 L 12,6 L 0,12 z" fill="#2A2F2F"/>
    </marker>
    <marker id="arr-mauve" viewBox="0 0 12 12" refX="11" refY="6"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0,0 L 12,6 L 0,12 z" fill="#6C3F49"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 12 12" refX="11" refY="6"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0,0 L 12,6 L 0,12 z" fill="#C74634"/>
    </marker>
  </defs>

  <!-- =============== TILE 1 — COMPOSITION (top-left) ===============
       Three composition primitives stacked: Sequential, Parallel, Loop.
       Mirrors src/tulip/agent/composition.py classes 1:1. -->
  <g transform="translate(0, 0)">
    <text x="20" y="24" font-size="14" font-weight="800" fill="#2A2F2F" letter-spacing="-0.01em">Composition</text>
    <text x="20" y="42" font-size="11" font-weight="500" fill="#6C3F49" letter-spacing="0.04em">SequentialPipeline · ParallelPipeline · LoopAgent</text>

    <!-- Sequential: A → B → C -->
    <text x="20" y="68" font-size="10" font-weight="600" fill="#6C3F49" font-style="italic">Sequential</text>
    <g filter="url(#shadow)">
      <rect x="20"  y="78" width="60" height="34" rx="6" fill="#04536F"/>
      <text x="50"  y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">A</text>
      <rect x="105" y="78" width="60" height="34" rx="6" fill="#04536F"/>
      <text x="135" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">B</text>
      <rect x="190" y="78" width="60" height="34" rx="6" fill="#04536F"/>
      <text x="220" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">C</text>
    </g>
    <line x1="83" y1="95" x2="102" y2="95" stroke="#2A2F2F" stroke-width="1.6" marker-end="url(#arr)"/>
    <line x1="168" y1="95" x2="187" y2="95" stroke="#2A2F2F" stroke-width="1.6" marker-end="url(#arr)"/>

    <!-- Parallel: input fans to A, B, C -->
    <text x="20" y="138" font-size="10" font-weight="600" fill="#6C3F49" font-style="italic">Parallel</text>
    <g filter="url(#shadow)">
      <rect x="20"  y="148" width="50" height="28" rx="5" fill="#89B2B0"/>
      <text x="45"  y="167" text-anchor="middle" font-size="10" font-weight="700" fill="#1F2828">in</text>
      <rect x="120" y="130" width="50" height="28" rx="5" fill="#04536F"/>
      <text x="145" y="149" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">A</text>
      <rect x="120" y="162" width="50" height="28" rx="5" fill="#04536F"/>
      <text x="145" y="181" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">B</text>
      <rect x="120" y="194" width="50" height="28" rx="5" fill="#04536F"/>
      <text x="145" y="213" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">C</text>
      <rect x="220" y="170" width="50" height="28" rx="5" fill="#89B2B0"/>
      <text x="245" y="189" text-anchor="middle" font-size="10" font-weight="700" fill="#1F2828">out</text>
    </g>
    <line x1="73" y1="162" x2="118" y2="144" stroke="#2A2F2F" stroke-width="1.4" marker-end="url(#arr)"/>
    <line x1="73" y1="162" x2="118" y2="176" stroke="#2A2F2F" stroke-width="1.4" marker-end="url(#arr)"/>
    <line x1="73" y1="162" x2="118" y2="208" stroke="#2A2F2F" stroke-width="1.4" marker-end="url(#arr)"/>
    <line x1="173" y1="144" x2="218" y2="180" stroke="#2A2F2F" stroke-width="1.4" marker-end="url(#arr)"/>
    <line x1="173" y1="176" x2="218" y2="184" stroke="#2A2F2F" stroke-width="1.4" marker-end="url(#arr)"/>
    <line x1="173" y1="208" x2="218" y2="190" stroke="#2A2F2F" stroke-width="1.4" marker-end="url(#arr)"/>

    <!-- Loop: A repeats until condition -->
    <text x="20" y="248" font-size="10" font-weight="600" fill="#6C3F49" font-style="italic">Loop</text>
    <g filter="url(#shadow)">
      <rect x="100" y="258" width="80" height="34" rx="6" fill="#04536F"/>
      <text x="140" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">revise</text>
    </g>
    <path d="M 180 275 Q 220 275, 220 295 Q 220 315, 140 315 Q 60 315, 60 295 Q 60 275, 100 275"
          stroke="#6C3F49" stroke-width="1.6" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-mauve)"/>
    <text x="195" y="328" font-size="10" font-style="italic" fill="#6C3F49">until confidence ≥ 0.85</text>
  </g>

  <!-- =============== TILE 2 — ORCHESTRATOR (top-right) =============== -->
  <g transform="translate(480, 0)">
    <text x="20" y="24" font-size="14" font-weight="800" fill="#2A2F2F" letter-spacing="-0.01em">Orchestrator + Specialists</text>
    <text x="20" y="42" font-size="11" font-weight="500" fill="#6C3F49" letter-spacing="0.04em">one router · parallel experts · confidence floors</text>
    <g filter="url(#shadow)">
      <rect x="160" y="65" width="120" height="40" rx="8" fill="#C74634"/>
      <text x="220" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Coordinator</text>
      <rect x="20"  y="155" width="100" height="40" rx="8" fill="#04536F"/>
      <text x="70"  y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Specialist 1</text>
      <rect x="170" y="155" width="100" height="40" rx="8" fill="#04536F"/>
      <text x="220" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Specialist 2</text>
      <rect x="320" y="155" width="100" height="40" rx="8" fill="#04536F"/>
      <text x="370" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Specialist 3</text>
    </g>
    <line x1="220" y1="108" x2="70"  y2="153" stroke="#2A2F2F" stroke-width="1.6" marker-end="url(#arr)"/>
    <line x1="220" y1="108" x2="220" y2="153" stroke="#2A2F2F" stroke-width="1.6" marker-end="url(#arr)"/>
    <line x1="220" y1="108" x2="370" y2="153" stroke="#2A2F2F" stroke-width="1.6" marker-end="url(#arr)"/>
    <line x1="70"  y1="197" x2="220" y2="225" stroke="#6C3F49" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arr-mauve)"/>
    <line x1="220" y1="197" x2="220" y2="225" stroke="#6C3F49" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arr-mauve)"/>
    <line x1="370" y1="197" x2="220" y2="225" stroke="#6C3F49" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arr-mauve)"/>
    <text x="120" y="125" font-size="10" font-weight="600" fill="#2A2F2F" font-style="italic">delegate</text>
    <text x="240" y="220" font-size="10" font-weight="600" fill="#6C3F49" font-style="italic">merge</text>
    <text x="20" y="265" font-size="11" fill="#2A2F2F" font-style="italic">coordinator delegates · specialists run in parallel · results merge back</text>
  </g>

  <!-- =============== TILE 3 — SWARM (row 2 left) =============== -->
  <g transform="translate(0, 380)">
    <text x="20" y="24" font-size="14" font-weight="800" fill="#2A2F2F" letter-spacing="-0.01em">Swarm</text>
    <text x="20" y="42" font-size="11" font-weight="500" fill="#6C3F49" letter-spacing="0.04em">peer-to-peer · shared context · post follow-up tasks</text>
    <g filter="url(#shadow)">
      <rect x="135" y="65" width="120" height="40" rx="8" fill="#F0CC71"/>
      <text x="195" y="83" text-anchor="middle" font-size="11" font-weight="700" fill="#3A2A0F">SharedContext</text>
      <text x="195" y="98" text-anchor="middle" font-size="9" font-style="italic" fill="#3A2A0F">+ task queue</text>
      <rect x="20"  y="160" width="80" height="40" rx="8" fill="#89B2B0"/>
      <text x="60"  y="185" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2828">Agent 1</text>
      <rect x="155" y="160" width="80" height="40" rx="8" fill="#89B2B0"/>
      <text x="195" y="185" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2828">Agent 2</text>
      <rect x="290" y="160" width="80" height="40" rx="8" fill="#89B2B0"/>
      <text x="330" y="185" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2828">Agent 3</text>
    </g>
    <!-- Agents pull from / post to queue (bidirectional) -->
    <line x1="60"  y1="158" x2="155" y2="105" stroke="#6C3F49" stroke-width="1.4" stroke-dasharray="3,3"/>
    <line x1="195" y1="158" x2="195" y2="105" stroke="#6C3F49" stroke-width="1.4" stroke-dasharray="3,3"/>
    <line x1="330" y1="158" x2="235" y2="105" stroke="#6C3F49" stroke-width="1.4" stroke-dasharray="3,3"/>
    <text x="20" y="225" font-size="11" fill="#2A2F2F" font-style="italic">no central router · agents pull from a shared queue</text>
  </g>

  <!-- =============== TILE 4 — HANDOFF (row 2 right) =============== -->
  <g transform="translate(480, 380)">
    <text x="20" y="24" font-size="14" font-weight="800" fill="#2A2F2F" letter-spacing="-0.01em">Handoff</text>
    <text x="20" y="42" font-size="11" font-weight="500" fill="#6C3F49" letter-spacing="0.04em">conversation transfers with full history</text>
    <g filter="url(#shadow)">
      <rect x="20"  y="100" width="120" height="55" rx="8" fill="#04536F"/>
      <text x="80" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Triage agent</text>
      <text x="80" y="142" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.85">"this is billing"</text>
      <rect x="280" y="100" width="120" height="55" rx="8" fill="#04536F"/>
      <text x="340" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Billing agent</text>
      <text x="340" y="142" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.85">picks up the thread</text>
    </g>
    <path d="M 145 127 L 275 127" stroke="#C74634" stroke-width="2.5" marker-end="url(#arr-red)"/>
    <text x="158" y="118" font-size="10" font-weight="600" fill="#C74634">full transcript →</text>
    <text x="20" y="225" font-size="11" fill="#2A2F2F" font-style="italic">role transfer · the customer doesn't have to re-explain</text>
  </g>

  <!-- =============== TILE 5 — STATEGRAPH (row 3 left) =============== -->
  <g transform="translate(0, 660)">
    <text x="20" y="24" font-size="14" font-weight="800" fill="#2A2F2F" letter-spacing="-0.01em">StateGraph</text>
    <text x="20" y="42" font-size="11" font-weight="500" fill="#6C3F49" letter-spacing="0.04em">DAG · cycles · conditional edges · Send fan-out · subgraphs</text>
    <g filter="url(#shadow)">
      <rect x="20"  y="80" width="80" height="40" rx="8" fill="#89B2B0"/>
      <text x="60"  y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2828">Plan</text>
      <rect x="150" y="80" width="80" height="40" rx="8" fill="#89B2B0"/>
      <text x="190" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2828">Research</text>
      <rect x="280" y="80" width="80" height="40" rx="8" fill="#89B2B0"/>
      <text x="320" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2828">Review</text>
    </g>
    <line x1="105" y1="100" x2="145" y2="100" stroke="#2A2F2F" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="235" y1="100" x2="275" y2="100" stroke="#2A2F2F" stroke-width="2" marker-end="url(#arr)"/>
    <path d="M 320 125 Q 320 165, 190 165 Q 60 165, 60 125"
          stroke="#6C3F49" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-mauve)"/>
    <text x="170" y="180" font-size="10" font-weight="600" fill="#6C3F49" font-style="italic">if confidence &lt; 0.85 (cycle)</text>
    <!-- Send fan-out from Research -->
    <text x="20" y="215" font-size="10" font-weight="600" fill="#C74634" font-style="italic">Send( ) fan-out:</text>
    <g filter="url(#shadow)">
      <rect x="135" y="200" width="40" height="22" rx="4" fill="#C74634"/>
      <text x="155" y="216" text-anchor="middle" font-size="9" font-weight="700" fill="#FFFFFF">w₁</text>
      <rect x="185" y="200" width="40" height="22" rx="4" fill="#C74634"/>
      <text x="205" y="216" text-anchor="middle" font-size="9" font-weight="700" fill="#FFFFFF">w₂</text>
      <rect x="235" y="200" width="40" height="22" rx="4" fill="#C74634"/>
      <text x="255" y="216" text-anchor="middle" font-size="9" font-weight="700" fill="#FFFFFF">w₃</text>
      <rect x="285" y="200" width="40" height="22" rx="4" fill="#C74634"/>
      <text x="305" y="216" text-anchor="middle" font-size="9" font-weight="700" fill="#FFFFFF">w₄</text>
    </g>
    <text x="20" y="245" font-size="11" fill="#2A2F2F" font-style="italic">explicit nodes · cycles guarded by max_iterations</text>
  </g>

  <!-- =============== TILE 6 — FUNCTIONAL (row 3 right) =============== -->
  <g transform="translate(480, 660)">
    <text x="20" y="24" font-size="14" font-weight="800" fill="#2A2F2F" letter-spacing="-0.01em">Functional API</text>
    <text x="20" y="42" font-size="11" font-weight="500" fill="#6C3F49" letter-spacing="0.04em">@task · @entrypoint · asyncio.gather</text>
    <g filter="url(#shadow)">
      <rect x="180" y="75" width="80" height="35" rx="8" fill="#C74634"/>
      <text x="220" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">@entrypoint</text>
      <rect x="20"  y="160" width="80" height="35" rx="8" fill="#04536F"/>
      <text x="60"  y="183" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">@task A</text>
      <rect x="120" y="160" width="80" height="35" rx="8" fill="#04536F"/>
      <text x="160" y="183" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">@task B</text>
      <rect x="220" y="160" width="80" height="35" rx="8" fill="#04536F"/>
      <text x="260" y="183" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">@task C</text>
      <rect x="320" y="160" width="80" height="35" rx="8" fill="#04536F"/>
      <text x="360" y="183" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">@task D</text>
    </g>
    <line x1="220" y1="113" x2="60"  y2="158" stroke="#2A2F2F" stroke-width="1.4" marker-end="url(#arr)"/>
    <line x1="220" y1="113" x2="160" y2="158" stroke="#2A2F2F" stroke-width="1.4" marker-end="url(#arr)"/>
    <line x1="220" y1="113" x2="260" y2="158" stroke="#2A2F2F" stroke-width="1.4" marker-end="url(#arr)"/>
    <line x1="220" y1="113" x2="360" y2="158" stroke="#2A2F2F" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="135" y="135" font-size="10" font-weight="600" fill="#2A2F2F" font-style="italic">asyncio.gather</text>
    <text x="20" y="225" font-size="11" fill="#2A2F2F" font-style="italic">map/reduce · plain coroutines · whatever asyncio gives you</text>
  </g>

  <!-- =============== TILE 7 — A2A (full-width bottom) =============== -->
  <g transform="translate(0, 920)">
    <text x="20" y="24" font-size="14" font-weight="800" fill="#2A2F2F" letter-spacing="-0.01em">A2A — across processes / runtimes</text>
    <text x="20" y="42" font-size="11" font-weight="500" fill="#6C3F49" letter-spacing="0.04em">A2AServer · A2AClient · AgentCard · capability discovery · HTTP+SSE</text>
    <g filter="url(#shadow)">
      <rect x="20"  y="65" width="260" height="80" rx="10" fill="#FBF9F8" stroke="#C74634" stroke-width="2"/>
      <text x="35"  y="85" font-size="10" font-weight="700" fill="#6C3F49">team-a · process-1 · A2AServer</text>
      <rect x="40"  y="95" width="100" height="32" rx="6" fill="#04536F"/>
      <text x="90"  y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">research</text>
      <rect x="155" y="95" width="100" height="32" rx="6" fill="#04536F"/>
      <text x="205" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">summary</text>

      <!-- AgentCard registry in the middle -->
      <rect x="380" y="80" width="200" height="50" rx="8" fill="#F0CC71" stroke="#6C3F49" stroke-width="1.5"/>
      <text x="480" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#3A2A0F">AgentCard registry</text>
      <text x="480" y="118" text-anchor="middle" font-size="9" font-style="italic" fill="#3A2A0F">discover by capability tag</text>

      <rect x="680" y="65" width="260" height="80" rx="10" fill="#FBF9F8" stroke="#C74634" stroke-width="2"/>
      <text x="695" y="85" font-size="10" font-weight="700" fill="#6C3F49">team-b · process-2 · A2AClient</text>
      <rect x="700" y="95" width="100" height="32" rx="6" fill="#89B2B0"/>
      <text x="750" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#1F2828">finance</text>
      <rect x="815" y="95" width="100" height="32" rx="6" fill="#89B2B0"/>
      <text x="865" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#1F2828">audit</text>
    </g>
    <!-- HTTP+SSE arc -->
    <path d="M 285 100 L 375 100"
          stroke="#C74634" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#arr-red)"/>
    <path d="M 585 100 L 675 100"
          stroke="#C74634" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#arr-red)"/>
    <text x="296" y="92" font-size="10" font-weight="700" fill="#C74634" letter-spacing="0.04em">HTTP+SSE</text>
    <text x="596" y="92" font-size="10" font-weight="700" fill="#C74634" letter-spacing="0.04em">HTTP+SSE</text>
    <text x="20" y="160" font-size="11" fill="#2A2F2F" font-style="italic">cross-runtime · same typed event stream survives the wire</text>
  </g>
</svg>
