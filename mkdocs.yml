site_name: tulip
site_description: Multi-agent workflows for Python — stream them, branch them, pause for a human, resume next week. Open source, provider-agnostic.
site_url: https://tuliplabs.ai/
repo_url: https://github.com/tuliplabs-ai/sdk-python
repo_name: tuliplabs-ai/sdk-python
edit_uri: edit/main/docs/

docs_dir: docs
strict: true

exclude_docs: |
  internal/
  doc-gen/
  img/patterns/README.md

theme:
  name: material
  custom_dir: overrides
  logo: img/mark.svg
  favicon: img/mark.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
  # Each scheme advertises the icon for the OTHER mode — clicking it
  # switches to that mode. So slate (dark) shows a sun (go to light)
  # and default (light) shows a moon (go to dark). The previous mapping
  # was reversed: slate showed a moon (already dark!) and default showed
  # a sun (already light!).
  - scheme: slate
    primary: custom
    accent: custom
    toggle:
      icon: material/brightness-7
      name: Switch to light mode
  - scheme: default
    primary: custom
    accent: custom
    toggle:
      icon: material/brightness-4
      name: Switch to dark mode
  features:
  - navigation.instant
  - navigation.sections
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.indexes
  - navigation.top
  - content.code.copy
  - content.code.annotate
  - content.tabs.link
  - search.highlight
  - search.share
  - search.suggest

extra_css:
- stylesheets/tulip.css

extra_javascript:
- javascripts/header-home.js
- javascripts/notebook-filter.js
- javascripts/sidebar-filter.js

copyright: <span class="footer-brand"><span class="footer-brand__text">tuliplabs</span></span><br><span class="footer-copy">Copyright &copy; 2026 tuliplabs</span>

extra:
  homepage: https://tuliplabs.ai/
  social:
  - icon: fontawesome/brands/github
    link: https://github.com/tuliplabs-ai/sdk-python
    name: tulip on GitHub
  - icon: fontawesome/brands/python
    link: https://pypi.org/project/tulip-agents/
    name: tulip-agents on PyPI
  generator: false

markdown_extensions:
- admonition
- attr_list
- md_in_html
- def_list
- footnotes
- pymdownx.details
- pymdownx.highlight:
    anchor_linenums: true
    line_spans: __span
    pygments_lang_class: true
- pymdownx.inlinehilite
- pymdownx.snippets:
    base_path: [.]
- pymdownx.superfences
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
- tables
- toc:
    permalink: true

plugins:
- search
- mkdocstrings:
    default_handler: python
    handlers:
      python:
        paths: [src]
        options:
          docstring_style: google
          show_source: true
          show_root_heading: true
          show_root_full_path: false
          separate_signature: true
          show_signature_annotations: true
          merge_init_into_class: true
          show_if_no_docstring: false
          inherited_members: true
          members_order: source

